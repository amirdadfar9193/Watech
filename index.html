<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>واتک - فناوری هوشمند مدیریت آب</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Vazirmatn', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 flex flex-col min-h-screen">

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold text-[#0F3D6F] tracking-wide">واتک</a>
            
            <div class="flex space-x-reverse space-x-4">
                <a href="catalog.html" class="border border-[#1A84C5] text-[#1A84C5] px-6 py-2 rounded-full font-semibold hover:bg-blue-50 transition duration-300">
                    کاتالوگ محصولات
                </a>
                <a href="contact.html" class="bg-[#0F3D6F] text-white px-6 py-2 rounded-full font-semibold hover:bg-[#1A84C5] transition duration-300 shadow-sm">
                    ارتباط با ما
                </a>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-6 py-20 lg:py-32 grid lg:grid-cols-2 gap-16 items-center">
        <div class="order-2 lg:order-1">
            <h1 class="text-4xl lg:text-5xl font-bold text-[#0F3D6F] mt-4 leading-tight">هوشمندیِ پشتِ آبِ پاک</h1>
            <p class="text-lg text-slate-600 mt-6 leading-relaxed">
                واتک با تلفیق حسگرهای پیشرفته اینترنت اشیاء (IoT) و تحلیل‌های هوشمند، مدیریت آب‌های صنعتی و شهری را متحول می‌کند و باعث حذف اتلاف منابع گرانبها می‌شود.
            </p>
            <div class="mt-8">

            </div>
        </div>
        <div class="flex justify-center relative order-1 lg:order-2">
            <div class="w-72 h-72 lg:w-96 lg:h-96 bg-gradient-to-tr from-[#1A84C5] to-[#59C3E3] rounded-full filter blur-3xl opacity-25 absolute -z-10 animate-pulse"></div>
            <div class="bg-white p-12 rounded-2xl shadow-xl border border-slate-100 flex items-center justify-center max-w-md w-full aspect-square transition duration-500 hover:scale-[1.02]">
                <img src="canvas.png" alt="لوگوی تجاری واتک" class="w-full h-auto object-contain max-h-56">
            </div>
        </div>
    </main>

    <footer class="bg-[#0F3D6F] text-white/70 text-center py-6 text-sm border-t border-white/10">
        <p>© ۱۴۰۵ واتک - تمامی حقوق متعلق به فناوری هوشمند مدیریت آب واتک می‌باشد.</p>
    </footer>

</body>
</html>
